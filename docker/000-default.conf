<VirtualHost *:80>
    ServerAdmin nethz@163.com
    ServerName api.xrugc.com 
    DocumentRoot /var/www/html/advanced/api/web

    PassEnv JWT_KEY JWT_PUB_KEY
    PassEnv MYSQL_HOST MYSQL_DB MYSQL_USERNAME MYSQL_PASSWORD
    PassEnv REDIS_HOST REDIS_PORT REDIS_DB
    PassEnv SECRET_ID SECRET_KEY
    PassEnv COS_BUCKETS_PUBLIC_BUCKET COS_BUCKETS_PUBLIC_REGION
    PassEnv COS_BUCKETS_PRIVATE_BUCKET COS_BUCKETS_PRIVATE_REGION
    PassEnv DEPLOYMENT_MODE FILE_STORAGE_DRIVER
    PassEnv LOCAL_STORAGE_ROOT LOCAL_STORAGE_PUBLIC_BASE_URL
    PassEnv LOCAL_STORAGE_PUBLIC_BUCKET LOCAL_STORAGE_PRIVATE_BUCKET LOCAL_STORAGE_TEMP_BUCKET
    PassEnv ENABLE_COS_STORAGE ENABLE_COS_IMAGE_PROCESSING ENABLE_AI_3D_GENERATOR
    PassEnv ENABLE_WECHAT_LOGIN ENABLE_APPLE_LOGIN ENABLE_GEO_IP_LOCALE ENABLE_ANALYTICS ENABLE_EXTERNAL_CDN
    PassEnv WECHAT_APP_ID WECHAT_APPID WECHAT_SECRET WECHAT_TOKEN
    PassEnv WECHAT_MCH_ID WECHAT_PAY_PRIVATE_KEY WECHAT_PAY_CERTIFICATE WECHAT_PAY_SECRET_KEY
    PassEnv WECHAT_PAY_NOTIFY_URL WECHAT_PAY_URL
    PassEnv MAILER_USERNAME MAILER_PASSWORD

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    <Directory "/var/www/html/advanced/api/web">
        # Disable .htaccess
        AllowOverride None
    </Directory>

    # Set up rewrites so that all requests go to index.php
    RewriteEngine on
    # if a directory or a file exists, use it directly
    RewriteCond /var/www/html/advanced/api/web%{REQUEST_FILENAME} !-f
    RewriteCond /var/www/html/advanced/api/web%{REQUEST_FILENAME} !-d
    # otherwise forward it to index.php
    RewriteRule . /var/www/html/advanced/api/web/index.php
</VirtualHost>
